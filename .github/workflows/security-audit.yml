name: Security Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '23 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install locked dependencies without lifecycle scripts
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Fail on high-severity dependency vulnerabilities
        run: pnpm audit --audit-level=high

  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect committed secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: 'false'
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'false'

  security-gate:
    name: Security Gate
    needs: [dependency-audit, secret-scan]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Require all security checks to pass
        env:
          DEPENDENCY_AUDIT_RESULT: ${{ needs.dependency-audit.result }}
          SECRET_SCAN_RESULT: ${{ needs.secret-scan.result }}
        run: |
          set -euo pipefail
          test "$DEPENDENCY_AUDIT_RESULT" = "success"
          test "$SECRET_SCAN_RESULT" = "success"
