name: Tenant Link Integrity

on:
  push:
    branches: [main, develop]
    paths:
      - 'prisma/schema.prisma'
      - 'prisma/migrations/**'
      - 'scripts/db/test-tenant-link-guards.sh'
      - 'scripts/db/test-initial-tenant-link-guards.sh'
      - 'scripts/db/test-identity-tenant-link-guards.sh'
      - 'scripts/db/verify-tenant-link-integrity.sql'
      - 'scripts/db/verify-identity-tenant-link-integrity.sql'
      - '.github/workflows/tenant-link-integrity.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'prisma/schema.prisma'
      - 'prisma/migrations/**'
      - 'scripts/db/test-tenant-link-guards.sh'
      - 'scripts/db/test-initial-tenant-link-guards.sh'
      - 'scripts/db/test-identity-tenant-link-guards.sh'
      - 'scripts/db/verify-tenant-link-integrity.sql'
      - 'scripts/db/verify-identity-tenant-link-integrity.sql'
      - '.github/workflows/tenant-link-integrity.yml'

jobs:
  tenant-link-integration:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: sidpro
          POSTGRES_PASSWORD: sidpro_secret
          POSTGRES_DB: sidpro
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://sidpro:sidpro_secret@localhost:5432/sidpro?schema=public
      NODE_ENV: test
      JWT_SECRET: ci-test-secret-key-not-for-production
      SEED_ADMIN_EMAIL: admin@demo-desa.id
      SEED_ADMIN_PASSWORD: CiLoginKey2026!Aa

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Apply migrations to clean PostgreSQL
        run: pnpm exec prisma migrate deploy --schema=prisma/schema.prisma

      - name: Seed integration database
        run: pnpm prisma:seed

      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17

      - name: Verify all tenant-link guards in PostgreSQL
        run: |
          bash scripts/db/test-tenant-link-guards.sh
          bash scripts/db/test-initial-tenant-link-guards.sh
          bash scripts/db/test-identity-tenant-link-guards.sh
