name: Refresh Tailwind v4 Node 24 lockfile

on:
  push:
    branches:
      - codex/tailwind-v4-node24

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor == 'arpayid'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: codex/tailwind-v4-node24

      - uses: pnpm/action-setup@v6
        with:
          version: 10.18.3

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Align Tailwind v4 manifest and lockfile
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const file = 'apps/web/package.json';
          const pkg = JSON.parse(fs.readFileSync(file, 'utf8'));
          pkg.devDependencies['@types/node'] = '^24.0.0';
          pkg.devDependencies['@tailwindcss/postcss'] = '^4.3.2';
          pkg.devDependencies.tailwindcss = '^4.3.2';
          fs.writeFileSync(file, `${JSON.stringify(pkg, null, 2)}\n`);
          NODE
          pnpm install --lockfile-only --ignore-scripts

      - name: Remove helper and commit generated files
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/_tailwind-v4-node24-lockfile.yml
          git add apps/web/package.json pnpm-lock.yaml
          git commit -m 'chore(web): align Tailwind v4 with Node 24 types'
          git push origin HEAD:codex/tailwind-v4-node24
