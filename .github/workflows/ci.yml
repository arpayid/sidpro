name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: sidpro
          POSTGRES_PASSWORD: sidpro_secret
          POSTGRES_DB: sidpro
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://sidpro:sidpro_secret@localhost:5432/sidpro?schema=public
      JWT_SECRET: ci-test-secret-key-not-for-production
      NODE_ENV: test
      MINIO_ENDPOINT: localhost
      MINIO_PORT: '9000'
      MINIO_ROOT_USER: sidpro
      MINIO_ROOT_PASSWORD: sidpro_secret
      MINIO_BUCKET: sidpro-files
      MINIO_USE_SSL: 'false'
      SEED_ADMIN_PASSWORD: Admin123!
      REDIS_URL: redis://localhost:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.18.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Validate Prisma schema
        run: pnpm prisma:validate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Migrate database
        run: pnpm exec prisma migrate deploy --schema=prisma/schema.prisma

      - name: Seed database
        run: pnpm prisma:seed

      - name: Verify backup script
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl ca-certificates
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc \
            -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client-17
          export BACKUP_DIR=$(mktemp -d)
          pnpm backup
          test -n "$(ls -1 "$BACKUP_DIR"/db_*.sql.gz 2>/dev/null)" || (echo "Backup file missing" && exit 1)
          echo "Backup OK: $(ls -1 "$BACKUP_DIR"/db_*.sql.gz)"

      - name: Start Redis
        run: |
          docker run -d --name redis -p 6379:6379 redis:7-alpine
          for i in $(seq 1 15); do
            if docker exec redis redis-cli ping | grep -q PONG; then
              echo "Redis ready"
              exit 0
            fi
            sleep 1
          done
          echo "Redis not ready"
          exit 1

      - name: Start MinIO
        run: |
          docker run -d --name minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=sidpro \
            -e MINIO_ROOT_PASSWORD=sidpro_secret \
            minio/minio server /data --address :9000
          for i in $(seq 1 30); do
            if curl -sf http://localhost:9000/minio/health/live >/dev/null; then
              echo "MinIO ready"
              exit 0
            fi
            sleep 2
          done
          docker logs minio || true
          echo "MinIO not ready"
          exit 1

      - name: Start API for smoke test
        run: |
          node apps/api/dist/main.js &
          echo $! > /tmp/api.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/api/v1/health >/dev/null; then
              echo "API ready"
              exit 0
            fi
            sleep 2
          done
          echo "API not ready"
          exit 1

      - name: Smoke test
        env:
          API_URL: http://localhost:4000
          STAGING_ADMIN_PASSWORD: Admin123!
          SMOKE_RUN_SEED: '0'
          SMOKE_SKIP_WEB: '1'
        run: bash scripts/smoke-test.sh

      - name: Stop API
        if: always()
        run: |
          if [ -f /tmp/api.pid ]; then kill "$(cat /tmp/api.pid)" || true; fi

      - name: Stop MinIO
        if: always()
        run: docker rm -f minio || true

      - name: Stop Redis
        if: always()
        run: docker rm -f redis || true

      - name: Dependency audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Docker Compose config
        run: docker compose config
