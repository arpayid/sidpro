name: Rebase Tailwind v4 migration

on:
  push:
    branches:
      - codex/tailwind-v4-compat-migration

permissions:
  contents: write

jobs:
  rebase:
    if: github.actor == 'arpayid'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: codex/tailwind-v4-compat-migration
          fetch-depth: 0

      - name: Rebase onto main and remove helper
        env:
          BRANCH: codex/tailwind-v4-compat-migration
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          git rebase origin/main
          git rm .github/workflows/_rebase-tailwind-v4.yml
          git commit -m 'chore: rebase Tailwind v4 migration onto main'
          git push --force-with-lease origin HEAD:"${BRANCH}"
