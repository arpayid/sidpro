name: AUDIT-2 Apply Dependency Remediation

on:
  push:
    branches:
      - codex/audit-2-dependency-remediation
    paths:
      - '.github/audit-2-apply-dependency-remediation'
      - '.github/workflows/audit-2-dependency-resolution-apply.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: true
      - uses: pnpm/action-setup@v6
        with:
          version: 10.18.3
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Confirm one-time apply request
        run: test -f .github/audit-2-apply-dependency-remediation
      - name: Apply audited manifest update
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const read = (path) => JSON.parse(fs.readFileSync(path, 'utf8'));
          const write = (path, value) => fs.writeFileSync(path, `${JSON.stringify(value, null, 2)}\n`);

          const root = read('package.json');
          delete root.devDependencies['@prisma/client'];
          root.devDependencies.prisma = '6.19.3';
          root.dependencies['@prisma/client'] = '6.19.3';
          root.pnpm = root.pnpm ?? {};
          root.pnpm.overrides = {
            ...(root.pnpm.overrides ?? {}),
            'postcss': '8.5.10',
            'uuid': '11.1.1',
            'js-yaml': '4.2.0',
          };
          write('package.json', root);

          for (const path of ['apps/api/package.json', 'apps/worker/package.json']) {
            const pkg = read(path);
            pkg.dependencies['@prisma/client'] = '6.19.3';
            write(path, pkg);
          }
          NODE
      - name: Regenerate lockfile with pnpm 10.18.3
        run: pnpm install --lockfile-only --reporter=silent
      - name: Verify lockfile and audit
        run: |
          pnpm install --frozen-lockfile --ignore-scripts --reporter=silent
          pnpm audit --audit-level=low
      - name: Commit generated remediation
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json apps/api/package.json apps/worker/package.json pnpm-lock.yaml
          git diff --cached --quiet && exit 0
          git commit -m 'fix(deps): remediate audit-2 advisories'
          git push origin HEAD:codex/audit-2-dependency-remediation
