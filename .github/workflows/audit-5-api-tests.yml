name: AUDIT-5 API Tests

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/api/test/audit-5-repository-gates.test.ts'
      - 'apps/api/src/core/queue/storage-cleanup-queue.service.ts'
      - '.github/workflows/audit-5-api-tests.yml'
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.18.3
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --reporter=silent
      - name: Generate Prisma client
        run: pnpm prisma:generate
      - name: Run API tests
        run: |
          set -o pipefail
          pnpm --filter @sidpro/api test 2>&1 | tee audit-5-api-tests.log
      - name: Upload API test diagnostics
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: audit-5-api-test-log
          path: audit-5-api-tests.log
          if-no-files-found: ignore
          retention-days: 14
