name: AUDIT-4 Security Policy

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/api/src/**'
      - 'apps/api/test/public-route-security-policy.test.ts'
      - 'apps/api/test/security-http-config.test.ts'
      - 'apps/api/test/session-cookie.test.ts'
      - 'apps/web/src/**'
      - 'apps/web/next.config.mjs'
      - 'apps/web/package.json'
      - 'apps/web/test/security-headers.test.ts'
      - 'apps/web/test/auth-session-boundary-policy.test.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/audit-4-security-policy.yml'
      - 'docs/audits/AUDIT-4-*.md'
      - 'docs/audits/AUDIT_MASTER_REGISTER.md'
      - 'docs/audits/AUDIT_CLI_HANDOFF.*'
      - 'docs/ROADMAP.md'
  pull_request:
    branches: [main, develop]
    paths:
      - 'apps/api/src/**'
      - 'apps/api/test/public-route-security-policy.test.ts'
      - 'apps/api/test/security-http-config.test.ts'
      - 'apps/api/test/session-cookie.test.ts'
      - 'apps/web/src/**'
      - 'apps/web/next.config.mjs'
      - 'apps/web/package.json'
      - 'apps/web/test/security-headers.test.ts'
      - 'apps/web/test/auth-session-boundary-policy.test.ts'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/audit-4-security-policy.yml'
      - 'docs/audits/AUDIT-4-*.md'
      - 'docs/audits/AUDIT_MASTER_REGISTER.md'
      - 'docs/audits/AUDIT_CLI_HANDOFF.*'
      - 'docs/ROADMAP.md'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10.18.3
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts --reporter=silent
      - name: Verify public route throttle policy
        run: pnpm audit:public-route-security
      - name: Verify API HTTP and session configuration policy
        run: pnpm --filter @sidpro/api exec tsx --test test/security-http-config.test.ts test/session-cookie.test.ts
      - name: Verify web response header and session policy
        run: pnpm --filter @sidpro/web exec tsx --test test/security-headers.test.ts test/auth-session-boundary-policy.test.ts
