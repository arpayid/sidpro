name: PR Documentation Gate

on:
  pull_request:
    types: [opened, edited, reopened, ready_for_review, synchronize]

permissions:
  pull-requests: read

jobs:
  require-roadmap-trace:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require completed roadmap impact and change trace
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';

            const missingHeadings = [
              '## Roadmap Impact',
              '## Change Trace',
            ].filter((heading) => !body.includes(heading));

            const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            const readField = (label) => {
              const match = body.match(
                new RegExp(`^\\s*-\\s*${escapeRegExp(label)}\\s*(.*?)\\s*$`, 'mi'),
              );
              return match?.[1].trim() ?? '';
            };
            const normalize = (value) => value.replace(/^`|`$/g, '').trim();
            const isPlaceholder = (value, allowedValues = []) => {
              const normalized = normalize(value).toLowerCase();
              if (allowedValues.includes(normalized)) return false;
              return (
                normalized.length === 0 ||
                ['n/a', 'na', 'none', 'tbd', 'todo', '...', '<...>'].includes(normalized) ||
                /^<[^>]+>$/.test(normalized) ||
                /^\[[^\]]+\]$/.test(normalized)
              );
            };

            const requiredFields = [
              { label: 'Audit:', allowValues: ['none'] },
              { label: 'Finding / area:' },
              { label: 'Status before:' },
              { label: 'Status after:' },
              { label: 'Validation evidence:' },
              { label: 'Documentation updated:' },
              { label: 'No roadmap impact:', allowValues: ['n/a', 'na'] },
              { label: 'Trace ID:' },
              { label: 'Execution mode:' },
              { label: 'Baseline commit / deployment:' },
              { label: 'Remaining action or closure evidence:' },
              { label: 'Secrets / PII recorded:', allowValues: ['none'] },
            ];

            const invalidFields = requiredFields
              .filter(({ label, allowValues = [] }) => isPlaceholder(readField(label), allowValues))
              .map(({ label }) => label);

            const executionMode = normalize(readField('Execution mode:'));
            const validExecutionModes = [
              'REPO_DOCS',
              'REPO_CI_READY',
              'VPS_REQUIRED',
              'HUMAN_UAT_REQUIRED',
            ];
            if (!validExecutionModes.includes(executionMode)) {
              invalidFields.push('Execution mode: valid mode required');
            }

            const failures = [
              ...missingHeadings.map((heading) => `${heading} heading`),
              ...invalidFields,
            ];

            if (failures.length) {
              core.setFailed(
                `PR documentation fields are missing, empty, placeholder-only, or invalid: ${failures.join(', ')}. ` +
                'Use .github/pull_request_template.md and docs/audits/ROADMAP_UPDATE_POLICY.md.',
              );
            }
