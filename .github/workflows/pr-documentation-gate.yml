name: PR Documentation Gate

on:
  pull_request:
    types: [opened, edited, reopened, ready_for_review, synchronize]

permissions:
  pull-requests: read

jobs:
  require-roadmap-trace:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require roadmap impact and change trace
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const required = [
              '## Roadmap Impact',
              '- Audit:',
              '- Validation evidence:',
              '- Documentation updated:',
              '- No roadmap impact:',
              '## Change Trace',
              '- Trace ID:',
              '- Execution mode:',
              '- Baseline commit / deployment:',
              '- Remaining action or closure evidence:',
              '- Secrets / PII recorded:',
            ];
            const missing = required.filter((entry) => !body.includes(entry));
            if (missing.length) {
              core.setFailed(
                `PR body is missing required documentation fields: ${missing.join(', ')}. ` +
                'Use .github/pull_request_template.md and docs/audits/ROADMAP_UPDATE_POLICY.md.'
              );
            }
