version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    ignore:
      # UUID v12+ is ESM-only; the API and ExcelJS report/export path remain CommonJS.
      # A future major upgrade requires an explicit compatibility migration and regression evidence.
      - dependency-name: uuid
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
