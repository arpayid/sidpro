version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      routine-npm-updates:
        update-types:
          - minor
          - patch
    ignore:
      # UUID v12+ is ESM-only; the API and ExcelJS report/export path remain CommonJS.
      # A future major upgrade requires an explicit compatibility migration and regression evidence.
      - dependency-name: uuid
        update-types:
          - version-update:semver-major
      # Runtime and tooling major upgrades are handled as planned compatibility work,
      # not as unattended Dependabot merges.
      - dependency-name: prisma
        update-types:
          - version-update:semver-major
      - dependency-name: "@prisma/client"
        update-types:
          - version-update:semver-major
      - dependency-name: eslint
        update-types:
          - version-update:semver-major
      - dependency-name: lucide-react
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    groups:
      routine-github-actions-updates:
        update-types:
          - minor
          - patch
    ignore:
      # Major workflow action upgrades can change action runtimes or script APIs.
      - dependency-name: actions/upload-artifact
        update-types:
          - version-update:semver-major
      - dependency-name: actions/github-script
        update-types:
          - version-update:semver-major
