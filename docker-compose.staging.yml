name: sidpro-staging

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sidpro_staging}
      POSTGRES_USER: ${POSTGRES_USER:-sidpro}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-replace-with-bunnyshell-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-replace-with-bunnyshell-secret}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-replace-with-bunnyshell-secret}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sidpro-staging}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-replace-with-bunnyshell-secret}
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.staging
      target: api
    command: >
      sh -c "node -e \"const net=require('net');const host='postgres';const port=5432;let left=60;function check(){const socket=net.createConnection(port,host);socket.setTimeout(2000);socket.on('connect',()=>{console.log('postgres is reachable');socket.destroy();process.exit(0)});socket.on('error',retry);socket.on('timeout',()=>{socket.destroy();retry()});function retry(){if(--left<=0){console.error('postgres is not reachable');process.exit(1)};setTimeout(check,2000)}}check();\" &&
      pnpm prisma migrate deploy --schema=prisma/schema.prisma &&
      pnpm --filter @sidpro/api start:prod"
    environment:
      NODE_ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-sidpro}:${POSTGRES_PASSWORD:-replace-with-bunnyshell-secret}@postgres:5432/${POSTGRES_DB:-sidpro_staging}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-replace-with-bunnyshell-secret}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-this-is-a-placeholder-staging-secret-change-before-deploy}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${WEB_ORIGIN:-https://placeholder.example.com}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sidpro-staging}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-replace-with-bunnyshell-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-sidpro-staging}
      ENABLE_SWAGGER: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "4000"

  worker:
    build:
      context: .
      dockerfile: Dockerfile.staging
      target: worker
    command: pnpm --filter @sidpro/worker start
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-sidpro}:${POSTGRES_PASSWORD:-replace-with-bunnyshell-secret}@postgres:5432/${POSTGRES_DB:-sidpro_staging}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-replace-with-bunnyshell-secret}@redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-sidpro-staging}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-replace-with-bunnyshell-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-sidpro-staging}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile.staging
      target: web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    command: pnpm --filter @sidpro/web start
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    depends_on:
      api:
        condition: service_started
    expose:
      - "3000"

volumes:
  postgres_data:
  redis_data:
  minio_data:
